<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Quiz App</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    /* NEW COLOR THEME */
    background: radial-gradient(circle at top, #2b1055, #7597de);
    color: white;
}

/* CARD */
.quiz-container {
    width: 450px;
    padding: 25px;
    border-radius: 20px;

    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 15px;
    color: #00e5ff;
}

/* QUESTION */
.question {
    font-size: 18px;
    margin-bottom: 15px;
}

/* OPTIONS */
.option {
    background: rgba(255,255,255,0.12);
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.option:hover {
    background: rgba(0,229,255,0.3);
}

.selected {
    background: linear-gradient(45deg, #00e5ff, #7c4dff);
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-top: 10px;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, #7c4dff, #00e5ff);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
}

/* RESULT */
.result {
    text-align: center;
    font-size: 22px;
    color: #00e5ff;
}

.small {
    font-size: 14px;
    margin-top: 10px;
    color: #ddd;
}
</style>
</head>

<body>

<div class="quiz-container">
    <h2>Advanced Quiz Game</h2>
    <div id="quiz"></div>
    <button onclick="nextQuestion()" id="btn">Next</button>
</div>

<script>
const questions = [
    {
        type: "mcq",
        question: "What is the capital of India?",
        options: ["Delhi", "Mumbai", "Chennai", "Kolkata"],
        answer: "Delhi"
    },
    {
        type: "mcq",
        question: "Which language runs in browser?",
        options: ["Java", "C", "JavaScript", "Python"],
        answer: "JavaScript"
    },
    {
        type: "multi",
        question: "Select programming languages",
        options: ["HTML", "CSS", "JavaScript", "Python"],
        answer: ["JavaScript", "Python"]
    },
    {
        type: "fill",
        question: "CSS stands for _________",
        answer: "Cascading Style Sheets"
    },
    {
        type: "mcq",
        question: "Which company developed Java?",
        options: ["Microsoft", "Sun Microsystems", "Google", "Oracle"],
        answer: "Sun Microsystems"
    },
    {
        type: "mcq",
        question: "HTML is used for?",
        options: ["Styling", "Structure", "Logic", "Database"],
        answer: "Structure"
    },
    {
        type: "multi",
        question: "Select front-end technologies",
        options: ["React", "Node.js", "Angular", "MongoDB"],
        answer: ["React", "Angular"]
    },
    {
        type: "fill",
        question: "WWW stands for _________",
        answer: "World Wide Web"
    }
];

let current = 0;
let score = 0;
let selected = [];

const quizDiv = document.getElementById("quiz");
const btn = document.getElementById("btn");

function loadQuestion() {
    selected = [];
    const q = questions[current];

    let html = `<div class='question'>Q${current + 1}. ${q.question}</div>`;

    if (q.type === "mcq") {
        q.options.forEach(opt => {
            html += `<div class="option" onclick="selectMCQ(this)">${opt}</div>`;
        });
    }

    else if (q.type === "multi") {
        q.options.forEach(opt => {
            html += `<div class="option" onclick="selectMulti(this)">${opt}</div>`;
        });
    }

    else if (q.type === "fill") {
        html += `<input type="text" id="fillInput" placeholder="Type your answer">`;
    }

    quizDiv.innerHTML = html;
}

function selectMCQ(el) {
    document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
    el.classList.add("selected");
    selected = el.innerText;
}

function selectMulti(el) {
    el.classList.toggle("selected");

    selected = Array.from(document.querySelectorAll(".selected"))
        .map(e => e.innerText);
}

function nextQuestion() {
    const q = questions[current];

    if (q.type === "mcq") {
        if (selected === q.answer) score++;
    }

    else if (q.type === "multi") {
        if (selected.sort().toString() === q.answer.sort().toString()) {
            score++;
        }
    }

    else if (q.type === "fill") {
        const input = document.getElementById("fillInput").value.trim();
        if (input.toLowerCase() === q.answer.toLowerCase()) score++;
    }

    current++;

    if (current < questions.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    quizDiv.innerHTML = `
        <div class="result">
            🎉 Quiz Completed <br><br>
            Score: ${score} / ${questions.length}
            <div class="small">Click restart to try again</div>
        </div>
    `;

    btn.innerText = "Restart Quiz";
    btn.onclick = restartQuiz;
}

function restartQuiz() {
    current = 0;
    score = 0;
    selected = [];

    btn.innerText = "Next";
    btn.onclick = nextQuestion;

    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
